name: Deploy Vite React UI (Simple)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64, prod, server-55]
    if: contains(github.event.head_commit.message, '#deploy')

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Login GHCR (PAT)
      - name: Login GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.CR_PAT }}

      # 3. Build image
      - name: Build Docker image
        run: |
          docker build --no-cache -t ghcr.io/wsnsa/landing-gui:latest .

      # 4. Push image
      - name: Push Docker image
        run: |
          docker push ghcr.io/wsnsa/landing-gui:latest

      # 5. Pull image (optional, safety)
      - name: Pull Docker image
        run: |
          docker pull ghcr.io/wsnsa/landing-gui:latest

      # 6. Stop old container
      - name: Stop old container
        run: |
          docker ps -q --filter "name=landing-ui" | ForEach-Object { docker rm -f $_ }

      # 7. Run container
      - name: Run Docker container
        run: |
          docker run -d `
            --name landing-ui `
            --restart always `
            -p 8000:80 `
            ghcr.io/wsnsa/landing-gui:latest

      # 8. Cleanup
      - name: Prune Docker images
        run: |
          docker image prune -f
