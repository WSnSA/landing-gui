name: Deploy Vite React UI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64, prod, server-55]
    if: contains(github.event.head_commit.message, '#deploy')

    steps:
      # -----------------------------
      # 1. Checkout
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Set image tag (commit SHA)
      # -----------------------------
      - name: Set image tag
        shell: powershell
        run: |
          $tag = $env:GITHUB_SHA.Substring(0,7)
          "IMAGE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # -----------------------------
      # 3. Login to GHCR (NO PAT)
      # -----------------------------
      - name: Login GHCR
        shell: powershell
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" |
          docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # -----------------------------
      # 4. Build Docker image
      # -----------------------------
      - name: Build Docker image
        shell: powershell
        run: |
          docker build --no-cache `
            -t ghcr.io/wsnsa/landing-gui:${{ env.IMAGE_TAG }} .

      # -----------------------------
      # 5. Push Docker image (unique tag)
      # -----------------------------
      - name: Push Docker image
        shell: powershell
        run: |
          docker push ghcr.io/wsnsa/landing-gui:${{ env.IMAGE_TAG }}

      # -----------------------------
      # 6. Tag & push latest (SAFE)
      # -----------------------------
      - name: Tag & push latest
        shell: powershell
        run: |
          docker tag ghcr.io/wsnsa/landing-gui:${{ env.IMAGE_TAG }} ghcr.io/wsnsa/landing-gui:latest
          docker push ghcr.io/wsnsa/landing-gui:latest

      # -----------------------------
      # 7. Stop old container
      # -----------------------------
      - name: Stop old container
        shell: powershell
        run: |
          docker rm -f landing-ui 2>$null

      # -----------------------------
      # 8. Run new container
      # -----------------------------
      - name: Run new container
        shell: powershell
        run: |
          docker run -d `
            --name landing-ui `
            --restart always `
            -p 8000:80 `
            ghcr.io/wsnsa/landing-gui:${{ env.IMAGE_TAG }}

      # -----------------------------
      # 9. Cleanup
      # -----------------------------
      - name: Cleanup
        shell: powershell
        run: |
          docker image prune -f
