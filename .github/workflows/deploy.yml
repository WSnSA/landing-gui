name: Deploy Vite React UI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64, prod, server-55]
    if: contains(github.event.head_commit.message, '#deploy')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.CR_PAT }}

      - name: Build Docker image
        run: |
          docker build --no-cache -t ghcr.io/wsnsa/landing-gui:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/wsnsa/landing-gui:latest

      - name: Stop old container
        run: |
          docker ps -q --filter "name=landing-ui" | ForEach-Object { docker rm -f $_ }

      - name: Run new container
        run: |
          docker run -d ^
            --name landing-ui ^
            --restart always ^
            -p 8000:80 ^
            ghcr.io/wsnsa/landing-gui:latest

      - name: Cleanup
        run: docker image prune -f
